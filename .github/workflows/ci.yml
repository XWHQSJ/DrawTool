name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sanitizer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        sanitizer: [asan, ubsan]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.sanitizer }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y freeglut3-dev libglew-dev

      - name: Set sanitizer flags
        id: san
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then
            echo "flags=-fsanitize=address -fno-omit-frame-pointer" >> "$GITHUB_OUTPUT"
          else
            echo "flags=-fsanitize=undefined -fno-omit-frame-pointer" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure
        run: |
          cmake -B build -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="${{ steps.san.outputs.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ steps.san.outputs.flags }}"

      - name: Build tests
        run: cmake --build build --target geometry_test --target script_test -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
